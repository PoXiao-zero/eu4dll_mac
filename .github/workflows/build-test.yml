name: Build Test Mac x86_64

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Verify cpp-pinyin Static Link
        run: |
          otool -L build/libeu4dll_mac.dylib
          if otool -L build/libeu4dll_mac.dylib | grep -q 'libcpp-pinyin'; then
            echo "::error::libeu4dll_mac.dylib still depends on libcpp-pinyin.dylib"
            exit 1
          fi

      - name: CodeSign Ad-Hoc
        run: |
          codesign --force --sign - build/libeu4dll_mac.dylib
          codesign --force --sign - build/tool/insert_dylib

      - name: Prepare Package
        run: |
          mkdir release_package
          cp build/libeu4dll_mac.dylib release_package/
          cp build/tool/insert_dylib release_package/
          cp install.sh release_package/
          cp -R build/chinese_dict release_package/

      - name: Create ZIP Archive
        run: |
          cd release_package
          zip -r ../eu4dll_mac_build_test_${{ github.run_number }}.zip ./*
          cd ..

      - name: Upload Test Package
        uses: actions/upload-artifact@v4
        with:
          name: eu4dll_mac_build_test_${{ github.run_number }}
          path: eu4dll_mac_build_test_${{ github.run_number }}.zip
