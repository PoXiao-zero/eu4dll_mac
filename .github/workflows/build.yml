name: Build and Release Mac x86_64

on:
  workflow_dispatch: # 开启手动触发按钮

permissions:
  contents: write # 赋予 Action 创建 Release 发布的写权限

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        # 配置 CMake，生成目录为 build，设置为 Release 模式
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        # 执行编译
        run: cmake --build build --config Release

      - name: Verify cpp-pinyin Static Link
        run: |
          otool -L build/libeu4dll_mac.dylib
          if otool -L build/libeu4dll_mac.dylib | grep -q 'libcpp-pinyin'; then
            echo "::error::libeu4dll_mac.dylib still depends on libcpp-pinyin.dylib"
            exit 1
          fi

      - name: CodeSign Ad-Hoc
        # 对编译产物进行 Ad-hoc 签名
        # --force 表示覆盖已有的签名(如果有的话)，--sign - 代表使用 adhoc(身份为短横线) 进行签名
        run: |
          codesign --force --sign - build/libeu4dll_mac.dylib
          codesign --force --sign - build/tool/insert_dylib

      - name: Prepare Package
        # 创建打包临时文件夹，将签名后的动态库和 insert_dylib、install.sh 复制进去
        run: |
          mkdir release_package
          cp build/libeu4dll_mac.dylib release_package/
          cp build/tool/insert_dylib release_package/
          cp install.sh release_package/
          cp -R build/chinese_dict release_package/

      - name: Create ZIP Archive
        # 压缩文件，名字带上自动递增的版本号 github.run_number
        run: |
          cd release_package
          zip -r ../eu4dll_mac_build_${{ github.run_number }}.zip ./*
          cd ..

      - name: Generate Release Body
        run: |
          previous_tag="$(git describe --tags --match 'b*' --abbrev=0 2>/dev/null || true)"

          if [ -n "${previous_tag}" ]; then
            git log "${previous_tag}..HEAD" --pretty=format:'* %s' > release_body.md
          else
            git log HEAD --pretty=format:'* %s' > release_body.md
          fi

          if ! grep -q '^\* ' release_body.md; then
            echo "* No commits found." > release_body.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: b${{ github.run_number }} # 自动创建Tag
          name: Release build_${{ github.run_number }} # 发布标题
          body_path: release_body.md
          files: eu4dll_mac_build_${{ github.run_number }}.zip # 绑定的压缩包文件
